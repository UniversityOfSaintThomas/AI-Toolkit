<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>AI Idea Book | AI Toolkit</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <div class="header-content">
        <a href="../../" class="logo">
          <img
            src="../../public/images/logo.png"
            alt="University of St. Thomas Logo"
            class="logo-img"
          />
          <div class="logo-text">
            <h1>AI Toolkit</h1>
            <p>University of St. Thomas</p>
          </div>
        </a>

        <input
          class="menu-btn"
          type="checkbox"
          id="menu-btn"
        />
        <label class="menu-icon" for="menu-btn">
          <span class="navicon"></span>
        </label>

        <nav class="menu">
          <a href="../../">Home</a>
          <a href="ai-idea-book.html" class="active">AI Idea Book</a>
          <a href="st-thomas-resources.html">St. Thomas Resources</a>
          <a href="grant-projects.html">Grant Projects</a>
          <a
            href="https://stthomas.az1.qualtrics.com/jfe/form/SV_7R4vacHBr4S8TjM"
            target="_blank"
            rel="noopener noreferrer"
          >
            Submit Your Idea
          </a>
        </nav>
      </div>
    </header>

    <main>
      <!-- Page Header -->
      <section class="page-header">
        <div class="container">
          <h2>AI Idea Book</h2>
          <div class="cta-buttons">
            <a
              href="https://stthomas.az1.qualtrics.com/jfe/form/SV_7R4vacHBr4S8TjM"
              target="_blank"
              class="btn btn-primary">Share Your Experience
            </a>
            <a href="#ideas" class="btn btn-secondary">Browse Ideas</a>
          </div>
        </div>
      </section>

      <!-- Filters -->
      <section class="filters" id="filters">
        <div class="container">
          <h3>Search Ideas</h3>
          <div class="search-bar">
            <input
              type="text"
              id="search"
              placeholder="Search anything: tools, departments, topics, names..."
            />
            <button id="search-btn">
              <i class="fas fa-search" aria-hidden="true"></i>
            </button>
          </div>

          <!-- Hidden filter controls -->
          <div class="filter-controls" style="display: none;">
            <div class="filter-group">
              <label for="department">Department</label>
              <select id="department">
                <option value="">All Departments</option>
                <option value="business">Business</option>
                <option value="education">Education</option>
                <option value="engineering">Engineering</option>
                <option value="humanities">Humanities</option>
                <option value="sciences">Sciences</option>
              </select>
            </div>

            <div class="filter-group">
              <label for="ai-tool">AI Tool</label>
              <select id="ai-tool">
                <option value="">All Tools</option>
                <option value="chatgpt">ChatGPT</option>
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
                <option value="dall-e">DALL-E</option>
                <option value="midjourney">Midjourney</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="filter-group">
              <label for="use-case">Use Case</label>
              <select id="use-case">
                <option value="">All Use Cases</option>
                <option value="content-creation">Content Creation</option>
                <option value="assessment">Assessment</option>
                <option value="feedback">Student Feedback</option>
                <option value="research">Research</option>
                <option value="accessibility">Accessibility</option>
              </select>
            </div>

            <button id="clear-filters" class="btn btn-secondary btn-sm">
              Clear Filters
            </button>
          </div>
        </div>
      </section>

      <!-- Ideas Grid -->
      <section class="ideas" id="ideas">
        <div class="container">
          <p class="results-count">
            <span id="idea-count">8</span> ideas found
          </p>
          <div class="ideas-grid" id="ideas-container">
            <!-- Ideas from ideasData const -->
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <div class="footer-bottom">
          <p style="width:100%;text-align:center;">
            &copy; 2025 University of St. Thomas. All rights reserved.
          </p>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
